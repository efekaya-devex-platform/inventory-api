apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: inventory-api
  labels:
    app: inventory-api
    release: monitoring   # picked up by kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: inventory-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
