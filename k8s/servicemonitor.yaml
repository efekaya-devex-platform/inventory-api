apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: test-service
  labels:
    app: test-service
    release: monitoring   # picked up by kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: test-service
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
