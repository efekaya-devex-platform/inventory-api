# grafana's sidecar picks up any configmap with this label automatically,
# no manual dashboard import needed
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-api-dashboard
  labels:
    grafana_dashboard: "1"
data:
  inventory-api.json: |
    {
      "title": "inventory-api",
      "uid": "inventory-api",
      "tags": ["idp-service"],
      "timezone": "browser",
      "panels": [
        {
          "title": "Requests / s",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [{"expr": "rate(app_requests_total{job=\"inventory-api\"}[1m])"}]
        },
        {
          "title": "Uptime (s)",
          "type": "stat",
          "gridPos": {"x": 12, "y": 0, "w": 6, "h": 8},
          "targets": [{"expr": "app_uptime_seconds{job=\"inventory-api\"}"}]
        },
        {
          "title": "Pod restarts",
          "type": "stat",
          "gridPos": {"x": 18, "y": 0, "w": 6, "h": 8},
          "targets": [{"expr": "sum(kube_pod_container_status_restarts_total{namespace=\"default\", pod=~\"inventory-api.*\"})"}]
        }
      ],
      "schemaVersion": 39,
      "time": {"from": "now-30m", "to": "now"}
    }
